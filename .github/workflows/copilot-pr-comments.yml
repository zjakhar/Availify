name: Copilot PR Comment Response

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  respond-to-comment:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      github.event_name == 'pull_request_review_comment' ||
      github.event_name == 'pull_request_review'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Acknowledge comment
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const actor = context.actor;

            // Skip if comment is from a bot (avoid loops)
            if (context.payload.sender && context.payload.sender.type === 'Bot') {
              console.log('Skipping bot comment to avoid loops');
              return;
            }

            // Get the PR number
            let prNumber;
            if (eventName === 'issue_comment') {
              prNumber = context.payload.issue.number;
            } else if (eventName === 'pull_request_review_comment') {
              prNumber = context.payload.pull_request.number;
            } else if (eventName === 'pull_request_review') {
              prNumber = context.payload.pull_request.number;
            }

            if (!prNumber) {
              console.log('Could not determine PR number');
              return;
            }

            // Get the comment body
            let commentBody = '';
            if (eventName === 'issue_comment') {
              commentBody = context.payload.comment.body || '';
            } else if (eventName === 'pull_request_review_comment') {
              commentBody = context.payload.comment.body || '';
            } else if (eventName === 'pull_request_review') {
              commentBody = context.payload.review.body || '';
            }

            // Check if the comment mentions @copilot or is a review requesting changes
            const lowerBody = commentBody.toLowerCase();
            const mentionsCopilot = lowerBody.includes('@copilot') ||
                                    lowerBody.includes('@github-copilot');
            const isRequestChanges = eventName === 'pull_request_review' &&
                                     context.payload.review.state === 'changes_requested';

            if (!mentionsCopilot && !isRequestChanges) {
              console.log('Comment does not mention @copilot and is not a change request, skipping');
              return;
            }

            const message = `Thanks for the feedback, @${actor}! I've received your comment and will address it shortly. 🤖`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: message
            });
